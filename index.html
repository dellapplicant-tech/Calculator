<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="calc.css" rel="stylesheet">
    <title>calculator</title>
</head>
<body>
    <div id="calcbody">
       <div>
        <input type="text" placeholder="0" >
       </div>
       <div class="button">
        <button class="red">AC</button>
        <button  class="red">C</button>
        <button class="red">%</button>
        <button class="red">+</button>
       </div>

        <div class="button">
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button class="red">X</button>
       </div>

        <div class="button">
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button class="red">-</button>
       </div>
        <div class="button">
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button class="red">÷</button>
       </div>
        <div class="button">
        <button>.</button>
        <button>0</button>
        <button>=</button>
        <button class="red" >/</button>
       </div>
    
    </div>
    <script  src="calc.js"></script>
</body>
</html>
